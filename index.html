<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Favicon (emoji-based SVG) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌴</text></svg>" />

    <!-- Primary Meta -->
    <title>Pool-n-Pay — Split Travel Expenses with Friends</title>
    <meta name="description" content="Pool-n-Pay makes it effortless to split group travel expenses, pool money for trips, settle up via UPI QR, and explore AI-powered itineraries. Built for adventurers." />
    <meta name="keywords" content="expense splitting, travel money, group expenses, UPI payment, trip planning, split bills, pool money, travel app" />
    <meta name="author" content="Varun Sharma" />
    <meta name="theme-color" content="#7c3aed" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://poolnpay.app/" />
    <meta property="og:title" content="Pool-n-Pay — Split Travel Expenses with Friends" />
    <meta property="og:description" content="The tropical travel expense app. Split bills, pool money, settle up via UPI, and plan AI itineraries — all in one beautiful app." />
    <meta property="og:image" content="https://poolnpay.app/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pool-n-Pay — Split Travel Expenses with Friends" />
    <meta name="twitter:description" content="The tropical travel expense app. Split bills, pool money, settle up via UPI QR codes." />

    <!-- PWA / Mobile App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pool-n-Pay" />
    <meta name="application-name" content="Pool-n-Pay" />
    <link rel="apple-touch-icon" href="/icon-512.png" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Pool-n-Pay",
      "description": "A tropical travel expense splitting app with UPI payments, group pooling, and AI itinerary generation.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
